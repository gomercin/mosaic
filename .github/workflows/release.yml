name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name, for example v0.1.0'
        required: true
        default: 'v0.1.0'
      prerelease:
        description: 'Mark as prerelease'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Create release archive
        run: |
          cd dist
          zip -r ../mosaic-static-site.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaic-static-site
          path: mosaic-static-site.zip
          if-no-files-found: error

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generate_release_notes: true
          files: mosaic-static-site.zip
