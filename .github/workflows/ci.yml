name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - scaffold-static-app
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-validate:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaic-dist
          path: dist
          if-no-files-found: error
